<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sana Bir Mesajım Var</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #ffeef2;
            font-family: 'Press+Start+2P', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.5s;
            touch-action: manipulation;
        }

        #container {
            background: white;
            padding: 30px 20px;
            border: 5px solid #000;
            box-shadow: 8px 8px 0px #ff4d6d;
            width: 90%;
            max-width: 350px;
            text-align: center;
            z-index: 10;
        }

        h2 { font-size: 12px; line-height: 1.6; margin-bottom: 25px; color: #222; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }

        button {
            font-family: 'Press+Start+2P', cursive;
            padding: 15px;
            font-size: 11px;
            cursor: pointer;
            border: 4px solid #000;
            background: #fff;
            box-shadow: 4px 4px 0px #000;
            width: 100%;
            max-width: 200px;
        }

        button:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        .evet { background-color: #98ff98; }
        .hayir { background-color: #ffb3ba; }

        #final {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ff4d6d;
            z-index: 100;
            text-align: center;
        }

        .pixel-heart {
            font-size: 80px; /* Mobilde taşmaması için küçültüldü */
            color: #fff;
            animation: blink 0.8s infinite steps(1);
            margin-bottom: 30px;
        }

        .heart-text {
            font-size: 14px;
            color: white;
            text-shadow: 3px 3px 0px #000;
            padding: 0 20px;
            line-height: 1.8;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop playsinline>
        <source src="sarkim.mp3" type="audio/mpeg">
    </audio>

    <div id="container">
        <div id="step1">
            <h2>Beni seviyor musun?</h2>
            <div class="btn-group">
                <button class="evet" onclick="startProcess()">EVET</button>
                <button class="hayir" onclick="startProcess()">HAYIR</button>
            </div>
        </div>

        <div id="step2" class="hidden">
            <h2>Sence ben seni seviyor muyum?</h2>
            <div class="btn-group">
                <button class="evet" onclick="showHeart()">EVET</button>
                <button class="hayir" onclick="showHeart()">HAYIR</button>
            </div>
        </div>
    </div>

    <div id="final">
        <div class="pixel-heart">❤</div>
        <div class="heart-text">SENİ TABİİ Kİ ÇOK SEVİYORUM!</div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');

        function startProcess() {
            // Mobilde müzik tetikleme
            music.play().then(() => {
                console.log("Müzik başladı");
            }).catch(e => {
                console.log("Müzik için etkileşim gerekiyor");
            });
            
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function showHeart() {
            document.getElementById('container').classList.add('hidden');
            const final = document.getElementById('final');
            final.style.display = 'flex';
            // Arka planı garantiye al
            document.body.style.backgroundColor = "#ff4d6d";
        }
    </script>
</body>
</html>
