<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Mesajım Var</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Press+Start+2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 1s ease;
        }
        #container {
            background: white;
            padding: 40px;
            border: 6px solid #000;
            box-shadow: 12px 12px 0px #ff4d6d;
            max-width: 450px;
            text-align: center;
            z-index: 10;
        }
        h2 { font-size: 16px; line-height: 1.8; margin-bottom: 30px; color: #222; }
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        button {
            font-family: 'Press+Start+2P', cursive;
            padding: 12px 20px;
            font-size: 12px;
            cursor: pointer;
            border: 4px solid #000;
            background: #fff;
            box-shadow: 4px 4px 0px #000;
            outline: none;
        }
        button:active { box-shadow: 0px 0px 0px #000; transform: translate(4px, 4px); }
        button.evet { background-color: #98ff98; }
        button.hayir { background-color: #ffb3ba; }
        #final { display: none; flex-direction: column; align-items: center; }
        .pixel-heart {
            font-size: 120px;
            color: #ff0040;
            animation: blink 0.8s infinite steps(1); 
            position: relative;
        }
        .heart-text {
            margin-top: 20px;
            font-size: 14px;
            color: #fff;
            line-height: 1.5;
            text-shadow: 3px 3px 0px #000;
        }
        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="sarkim.mp3" type="audio/mpeg">
    </audio>

    <div id="container">
        <div id="step1">
            <h2>Beni seviyor musun?</h2>
            <div class="btn-group">
                <button class="evet" onclick="startProcess()">EVET</button>
                <button class="hayir" onclick="startProcess()">HAYIR</button>
            </div>
        </div>

        <div id="step2" class="hidden">
            <h2>Sence ben seni seviyor muyum?</h2>
            <div class="btn-group">
                <button class="evet" onclick="showHeart()">EVET</button>
                <button class="hayir" onclick="showHeart()">HAYIR</button>
            </div>
        </div>

        <div id="final">
            <div class="pixel-heart">❤</div>
            <div class="heart-text">Seni tabii ki çok seviyorum!</div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');

        function startProcess() {
            music.play().catch(e => console.log("Müzik etkileşim bekliyor..."));
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }
        function showHeart() {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('container').classList.add('hidden'); // Beyaz kutuyu komple gizle
            
            // Final ekranını görünür yap ve ekranın tam ortasına al
            const final = document.getElementById('final');
            final.style.display = 'flex';
            final.style.position = 'fixed';
            final.style.top = '50%';
            final.style.left = '50%';
            final.style.transform = 'translate(-50%, -50%)';
            
            // Arka planı değiştir
            document.body.style.backgroundColor = "#ff4d6d";
        }
        
    </script>
</body>
</html>
