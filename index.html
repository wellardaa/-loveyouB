<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Mesajım Var</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Press+Start+2P', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.5s;
        }

        #container {
            background: white;
            padding: 40px;
            border: 6px solid #000;
            box-shadow: 12px 12px 0px #ff4d6d;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        h2 { font-size: 14px; line-height: 1.8; margin-bottom: 30px; color: #222; }

        .btn-group { display: flex; gap: 15px; justify-content: center; }

        button {
            font-family: 'Press+Start+2P', cursive;
            padding: 12px 20px;
            font-size: 10px;
            cursor: pointer;
            border: 4px solid #000;
            background: #fff;
            box-shadow: 4px 4px 0px #000;
        }

        button:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }
        .evet { background-color: #98ff98; }
        .hayir { background-color: #ffb3ba; }

        /* Final Ekranı Ayarları */
        #final {
            display: none; /* Başlangıçta gizli */
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            z-index: 100;
        }

        .pixel-heart {
            font-size: 150px;
            color: #ff0040;
            animation: blink 0.8s infinite steps(1);
            margin-bottom: 20px;
        }

        .heart-text {
            font-size: 16px;
            color: white;
            text-shadow: 4px 4px 0px #000;
            padding: 0 20px;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="sarkim.mp3" type="audio/mpeg">
    </audio>

    <div id="container">
        <div id="step1">
            <h2>Beni seviyor musun?</h2>
            <div class="btn-group">
                <button class="evet" onclick="startProcess()">EVET</button>
                <button class="hayir" onclick="startProcess()">HAYIR</button>
            </div>
        </div>

        <div id="step2" class="hidden">
            <h2>Sence ben seni seviyor muyum?</h2>
            <div class="btn-group">
                <button class="evet" onclick="showHeart()">EVET</button>
                <button class="hayir" onclick="showHeart()">HAYIR</button>
            </div>
        </div>
    </div>

    <div id="final">
        <div class="pixel-heart">❤</div>
        <div class="heart-text">Seni tabii ki çok seviyorum!</div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');

        function startProcess() {
            music.play().catch(e => console.log("Müzik etkileşim bekliyor..."));
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function showHeart() {
            // Beyaz kutuyu tamamen kaldır
            document.getElementById('container').style.display = "none";
            
            // Arka planı kırmızı yap
            document.body.style.backgroundColor = "#ff4d6d";
            
            // Kalbi ve yazıyı göster
            const final = document.getElementById('final');
            final.style.display = 'flex';
        }
    </script>
</body>
</html>
